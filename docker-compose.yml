services:
  portfolio:
    build: .
    image: portfolio:latest
    container_name: portfolio
    restart: unless-stopped
    networks:
      - traefik-public
      - default
    labels:
      # --- Observability: tailed by the monitoring stack's Alloy via the Docker API ---
      logging: "promtail"
      stackname: "portfolio"

      # --- Traefik ingress: HTTPS on roythan.de, Let's Encrypt via the `le` resolver ---
      traefik.enable: "true"
      traefik.docker.network: "traefik-public"
      traefik.http.routers.portfolio.entrypoints: "https"
      traefik.http.routers.portfolio.rule: "Host(`${PORTFOLIO_DOMAIN:-roythan.de}`)"
      traefik.http.routers.portfolio.tls: "true"
      traefik.http.routers.portfolio.tls.certresolver: "le"
      # nginx inside the container listens on :80
      traefik.http.services.portfolio.loadbalancer.server.port: "80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

networks:
  # Shared ingress network created once on the host: `docker network create traefik-public`
  traefik-public:
    external: true
  default:
